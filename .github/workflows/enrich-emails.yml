name: enrich-emails

# Outscraper Email & Contact Finder.
# Runs through unique business email domains we already have (from Brave +
# Outscraper-Maps) and pulls personal emails (firstname@, firstname.lastname@,
# etc.) when those are published on the agency website.
#
# Default cap: 200 domains/run = ~$2 at Outscraper's email-finder pricing.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Domains to enrich this run (default 200)"
        required: false
        default: "200"
      single_domain:
        description: "Optional: enrich one specific domain (skips selection logic)"
        required: false
        default: ""

  schedule:
    # Weekly Saturday 08:00 UTC. Slow + cheap rolling enrichment of new
    # domains added by the email/phone scrapers earlier in the week.
    - cron: "0 8 * * 6"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install --no-audit --no-fund --silent
      - name: Run email enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
          ENRICH_EMAILS_LIMIT: ${{ github.event.inputs.limit || '200' }}
        run: |
          if [ -n "${{ github.event.inputs.single_domain }}" ]; then
            npx tsx scripts/enrich-emails.ts --domain "${{ github.event.inputs.single_domain }}"
          else
            npx tsx scripts/enrich-emails.ts --limit ${{ github.event.inputs.limit || '200' }}
          fi
