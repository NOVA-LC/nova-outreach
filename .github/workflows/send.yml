name: send-batch

on:
  # Two trigger paths:
  #   1) repository_dispatch — fired by Supabase pg_cron every 30 min via the
  #      GitHub API. Reliable; not subject to GitHub free-tier scheduled-cron
  #      best-effort drops. This is the primary path.
  #   2) schedule — backup, runs on GitHub's best-effort cron. If pg_cron is
  #      down or the PAT expires, the workflow still fires on schedule.
  repository_dispatch:
    types: [send-now]
  schedule:
    - cron: "0,30 13-22 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max emails for this run (overrides PER_RUN_CAP)"
        required: false
        default: "6"
      dry:
        description: "Dry run (render only, don't send)"
        type: boolean
        required: false
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: nova-send
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install deps
        run: npm install --no-audit --no-fund --silent
      - name: Send batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_URL: ${{ vars.APP_URL }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          FROM_NAME: ${{ vars.FROM_NAME }}
          REPLY_TO: ${{ vars.REPLY_TO }}
          COMPLIANCE_ADDRESS: ${{ vars.COMPLIANCE_ADDRESS }}
          DAILY_SEND_CAP: ${{ vars.DAILY_SEND_CAP }}
          PER_RUN_CAP: ${{ github.event.inputs.limit || vars.PER_RUN_CAP }}
        run: |
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then
            npx tsx scripts/send-batch.ts --dry --limit ${{ github.event.inputs.limit || '6' }}
          else
            npx tsx scripts/send-batch.ts --limit ${{ github.event.inputs.limit || '6' }}
          fi
